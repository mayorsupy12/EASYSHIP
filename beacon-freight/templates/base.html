<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Beacon Freight Solutions{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/lucide.min.css"/>
  <style>
    :root{
      --bg:#080d1a;--bg2:#0d1428;--bgc:#111827;--bgch:#161f35;--bgs:#1a2540;
      --ac:#00d4ff;--ac2:#0066ff;--acw:#ff6b35;--acg:rgba(0,212,255,.15);
      --t1:#f0f4ff;--t2:#8892a4;--t3:#4a5568;
      --bd:rgba(255,255,255,.07);--bda:rgba(0,212,255,.3);
      --ok:#00d68f;--warn:#ffb347;--err:#ff4757;
      --fd:'Syne',sans-serif;--fb:'DM Sans',sans-serif;
      --r1:6px;--r2:10px;--r3:16px;--r4:24px;
      --tr:all .2s cubic-bezier(.4,0,.2,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html{scroll-behavior:smooth}
    body{font-family:var(--fb);background:var(--bg);color:var(--t1);line-height:1.6;font-size:15px;-webkit-font-smoothing:antialiased}
    a{color:inherit;text-decoration:none}
    button{font-family:var(--fb);cursor:pointer}
    input,select,textarea{font-family:var(--fb)}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:var(--bg)}
    ::-webkit-scrollbar-thumb{background:var(--bgs);border-radius:3px}

    /* ── Utility ── */
    .container{max-width:1280px;margin:0 auto;padding:0 24px}
    .flex{display:flex}.fca{display:flex;align-items:center}
    .g8{gap:8px}.g12{gap:12px}.g16{gap:16px}

    /* ── Badges ── */
    .badge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:500;letter-spacing:.3px;white-space:nowrap}
    .bs{background:rgba(0,214,143,.12);color:var(--ok);border:1px solid rgba(0,214,143,.2)}
    .bw{background:rgba(255,179,71,.12);color:var(--warn);border:1px solid rgba(255,179,71,.2)}
    .be{background:rgba(255,71,87,.12);color:var(--err);border:1px solid rgba(255,71,87,.2)}
    .bi{background:rgba(0,212,255,.12);color:var(--ac);border:1px solid rgba(0,212,255,.2)}
    .bm{background:rgba(255,255,255,.06);color:var(--t2);border:1px solid var(--bd)}

    /* ── Buttons ── */
    .btn{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:var(--r2);font-size:14px;font-weight:500;transition:var(--tr);border:none;cursor:pointer;white-space:nowrap}
    .btn-p{background:var(--ac);color:var(--bg)}
    .btn-p:hover{background:#33dcff;transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,212,255,.3)}
    .btn-s{background:transparent;color:var(--t1);border:1px solid var(--bd)}
    .btn-s:hover{background:var(--bgs);border-color:var(--bda)}
    .btn-g{background:transparent;color:var(--t2);padding:8px 14px}
    .btn-g:hover{color:var(--t1);background:var(--bgs);border-radius:var(--r1)}
    .btn-d{background:rgba(255,71,87,.15);color:var(--err);border:1px solid rgba(255,71,87,.3)}
    .btn-d:hover{background:rgba(255,71,87,.25)}
    .btn-sm{padding:6px 14px;font-size:13px}

    /* ── Cards ── */
    .card{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r3);padding:24px;transition:var(--tr)}
    .card:hover{border-color:rgba(255,255,255,.12)}

    /* ── Forms ── */
    .fg{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
    .fl{font-size:12px;font-weight:500;color:var(--t2);letter-spacing:.5px;text-transform:uppercase}
    .fi{background:var(--bgs);border:1px solid var(--bd);border-radius:var(--r2);padding:10px 14px;font-size:14px;color:var(--t1);transition:var(--tr);outline:none;width:100%}
    .fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(0,212,255,.1)}
    .fi::placeholder{color:var(--t3)}

    /* ── Table ── */
    .tw{overflow-x:auto}
    table{width:100%;border-collapse:collapse}
    th{padding:10px 16px;text-align:left;font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;border-bottom:1px solid var(--bd)}
    td{padding:14px 16px;font-size:14px;color:var(--t2);border-bottom:1px solid rgba(255,255,255,.04)}
    tr:hover td{background:rgba(255,255,255,.02);color:var(--t1)}
    tr:last-child td{border-bottom:none}

    /* ── Stat card ── */
    .sc{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r3);padding:20px 24px;position:relative;overflow:hidden;transition:var(--tr)}
    .sc::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;border-radius:0 var(--r3) 0 100%;opacity:.07}
    .sc.c1::before{background:var(--ac)}.sc.c2::before{background:var(--ac2)}.sc.c3::before{background:var(--acw)}.sc.c4::before{background:var(--ok)}
    .sc:hover{border-color:rgba(255,255,255,.12);transform:translateY(-2px)}
    .sl{font-size:11px;font-weight:600;color:var(--t3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:8px}
    .sv{font-family:var(--fd);font-size:32px;font-weight:700;color:var(--t1);line-height:1}
    .ss{font-size:12px;color:var(--t3);margin-top:6px;display:flex;align-items:center;gap:4px}
    .up{color:var(--ok)}.dn{color:var(--err)}
    .si{position:absolute;top:20px;right:20px;color:var(--t3);opacity:.4;font-size:20px}

    /* ── Grid ── */
    .sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:32px}

    /* ── Page header ── */
    .ph{margin-bottom:32px}
    .ph h1{font-family:var(--fd);font-size:28px;font-weight:700}
    .ph p{color:var(--t2);font-size:14px;margin-top:4px}

    /* ── Modal ── */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;z-index:300;padding:16px}
    .modal{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r3);width:100%;max-width:580px;padding:28px;max-height:90vh;overflow-y:auto}

    /* ── Animations ── */
    @keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
    .fu{animation:fadeUp .35s ease both}
    .fu1{animation-delay:.05s}.fu2{animation-delay:.1s}.fu3{animation-delay:.15s}.fu4{animation-delay:.2s}
    @keyframes spin{to{transform:rotate(360deg)}}
    .spin{animation:spin 1s linear infinite;display:inline-block}

    /* ── Toast ── */
    #toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px}
    .toast-item{background:var(--bgc);border:1px solid var(--bd);border-radius:var(--r2);padding:12px 18px;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:fadeUp .3s ease both;display:flex;align-items:center;gap:10px}
    .toast-item.tok{border-color:rgba(0,214,143,.3);color:var(--ok)}
    .toast-item.terr{border-color:rgba(255,71,87,.3);color:var(--err)}

    {% block extra_style %}{% endblock %}
  </style>
</head>
<body>
{% block body %}{% endblock %}

<div id="toast"></div>

<script>
function toast(msg, type='ok'){
  const el=document.createElement('div');
  el.className=`toast-item t${type}`;
  el.textContent=msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(()=>el.remove(),3500);
}
function $(s,ctx=document){return ctx.querySelector(s)}
function $$(s,ctx=document){return [...ctx.querySelectorAll(s)]}
async function api(url,opts={}){
  const r=await fetch(url,{headers:{'Content-Type':'application/json'},...opts});
  if(!r.ok) throw new Error(await r.text());
  return r.json();
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
